<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形查看工具</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: rgba(30, 30, 50, 0.95);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(100, 100, 150, 0.3);
        }

        .sidebar h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 1.8em;
        }

        .control-panel {
            background: rgba(40, 40, 70, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .control-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.85em;
            color: #aaa;
        }

        .control-group input[type="number"],
        .control-group input[type="text"],
        .control-group select {
            background: rgba(60, 60, 90, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.5);
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            min-width: 100px;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c5ce7, #5541d7);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .chart-container {
            flex: 1;
            background: rgba(20, 20, 40, 0.8);
            border-radius: 10px;
            padding: 15px;
            min-height: 500px;
        }

        #waveformChart {
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        .file-section {
            margin-bottom: 20px;
        }

        .file-item {
            background: rgba(50, 50, 80, 0.6);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }

        .file-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: 600;
            color: #00d4ff;
            font-size: 0.9em;
            word-break: break-all;
        }

        .column-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .column-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(70, 70, 100, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .column-checkbox:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .column-checkbox input {
            accent-color: #00d4ff;
        }

        .range-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .range-selector input {
            width: 80px;
        }

        .segment-item {
            background: rgba(60, 60, 90, 0.5);
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .segment-name {
            color: #ffd93d;
            font-weight: 500;
        }

        .color-indicator {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        .formula-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .formula-input input {
            flex: 1;
        }

        .legend-panel {
            background: rgba(40, 40, 70, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 5px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }
        
        .legend-item:hover {
            background: rgba(70, 70, 100, 0.6);
        }

        .legend-color {
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-info {
            font-size: 0.85em;
        }

        .offset-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            font-size: 0.8em;
            flex-wrap: wrap;
        }

        .offset-controls label {
            color: #aaa;
        }

        .offset-controls input[type="number"] {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.3);
            color: #e0e0e0;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .offset-enable-label {
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            margin-right: 10px;
            padding: 2px 6px;
            background: rgba(70, 70, 100, 0.5);
            border-radius: 3px;
        }

        .offset-enable-label:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .offset-enable-label input {
            accent-color: #00d4ff;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .slider-container {
            margin-top: 15px;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #aaa;
        }

        .slider-container input[type="range"] {
            width: 100%;
            accent-color: #00d4ff;
        }

        .display-options {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 100, 150, 0.3);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .radio-option input {
            accent-color: #00d4ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(40, 40, 70, 0.95);
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #00d4ff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5em;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #fff;
        }

        .formula-help {
            background: rgba(60, 60, 90, 0.5);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.85em;
        }

        .formula-help h4 {
            color: #ffd93d;
            margin-bottom: 8px;
        }

        .formula-help code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state p {
            margin-top: 10px;
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
        }

        .data-info {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        .segments-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .visibility-toggle {
            accent-color: #00d4ff;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .stats-info {
            background: rgba(50, 50, 80, 0.6);
            border-radius: 8px;
            padding: 15px;
        }

        .stats-item {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .stats-value {
            margin: 5px 0;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .stats-location {
            margin: 5px 0;
            padding: 5px 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .time-config {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 100, 150, 0.3);
        }

        .time-config-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .time-config-header h3 {
            color: #00d4ff;
            font-size: 1em;
            margin: 0;
        }

        .time-enable-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.85em;
            background: rgba(70, 70, 100, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .time-enable-label:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .time-enable-label input {
            accent-color: #00d4ff;
        }

        .time-inputs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .time-input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-input-row label {
            font-size: 0.85em;
            color: #aaa;
            min-width: 80px;
        }

        .time-input-row input {
            background: rgba(60, 60, 90, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.5);
            color: #fff;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 0.85em;
            flex: 1;
        }

        .time-input-row input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .time-unit {
            font-size: 0.8em;
            color: #888;
            min-width: 30px;
        }

        .time-column-config {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(100, 100, 150, 0.2);
        }

        .time-column-config .config-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .time-column-config label {
            font-size: 0.8em;
            color: #aaa;
            min-width: 70px;
        }

        .time-column-config select,
        .time-column-config input {
            background: rgba(60, 60, 90, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.5);
            color: #fff;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .time-column-config select:focus,
        .time-column-config input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .time-column-enable {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.8em;
            background: rgba(70, 70, 100, 0.5);
            padding: 3px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        .time-column-enable:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .time-column-enable input {
            accent-color: #00d4ff;
        }

        .timestamp-options {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 4px;
        }

        .timestamp-options.active {
            display: block;
        }

        .string-time-options {
            display: none;
            margin-top: 8px;
            padding: 8px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 4px;
        }

        .string-time-options.active {
            display: block;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                max-height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📁 数据管理</h2>
            
            <div class="file-section">
                <div class="file-input-wrapper">
                    <button class="btn">📂 导入CSV文件</button>
                    <input type="file" id="fileInput" accept=".csv" multiple>
                </div>
            </div>

            <div id="filesList"></div>

            <div class="display-options">
                <h3 style="color: #00d4ff; margin-bottom: 10px; font-size: 1em;">📊 显示选项</h3>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="lines" checked onchange="updateDisplayMode()">
                        <span>折线图</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="markers" onchange="updateDisplayMode()">
                        <span>散点图</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="lines+markers" onchange="updateDisplayMode()">
                        <span>混合</span>
                    </label>
                </div>

                <div class="time-config">
                    <div class="time-config-header">
                        <h3>⏱️ 时间显示</h3>
                        <label class="time-enable-label">
                            <input type="checkbox" id="timeDisplayEnabled" onchange="updateChart()">
                            启用
                        </label>
                    </div>
                    <div class="time-inputs">
                        <div class="time-input-row">
                            <label>时间原点:</label>
                            <input type="number" id="timeOrigin" value="0" step="0.001" onchange="updateChart()">
                            <span class="time-unit">ms</span>
                        </div>
                        <div class="time-input-row">
                            <label>时间间隔:</label>
                            <input type="number" id="timeInterval" value="1" step="0.001" min="0.001" onchange="updateChart()">
                            <span class="time-unit">ms</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="legend-panel">
                <h3 style="color: #00d4ff; margin-bottom: 10px; font-size: 1em;">📋 图例</h3>
                <div id="legendList">
                    <p style="color: #888; font-size: 0.85em;">暂无数据</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>🌊 波形查看工具</h1>
                <div class="zoom-controls">
                    <button class="btn btn-small" onclick="zoomIn()">🔍+ 放大</button>
                    <button class="btn btn-small" onclick="zoomOut()">🔍- 缩小</button>
                    <button class="btn btn-small" onclick="resetZoom()">↺ 重置</button>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-row">
                    <button class="btn btn-secondary" onclick="showFormulaModal()">📐 公式运算</button>
                    <button class="btn btn-secondary" onclick="createSegment()">📌 创建数据段</button>
                    <button class="btn btn-secondary" onclick="showStatsModal()">📊 区域统计</button>
                </div>
            </div>

            <div class="chart-container">
                <div id="waveformChart"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="formulaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📐 公式运算</h3>
                <button class="modal-close" onclick="closeFormulaModal()">&times;</button>
            </div>
            <div class="control-group">
                <label>选择数据段</label>
                <select id="formulaSegmentSelect">
                    <option value="">请选择数据段</option>
                </select>
            </div>
            <div class="formula-input">
                <input type="text" id="formulaInput" placeholder="输入公式，如: y*2+1">
                <button class="btn" onclick="applyFormula()">应用</button>
            </div>
            <div class="formula-help">
                <h4>公式说明</h4>
                <p>使用 <code>y</code> 代表原始数据值，支持以下运算：</p>
                <p>• 基本运算: <code>+ - * /</code></p>
                <p>• 数学函数: <code>sin(y), cos(y), abs(y), sqrt(y), log(y), exp(y)</code></p>
                <p>• 示例: <code>y*2</code>, <code>y+10</code>, <code>sin(y)</code></p>
            </div>
        </div>
    </div>

    <div class="modal" id="segmentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📌 创建数据段</h3>
                <button class="modal-close" onclick="closeSegmentModal()">&times;</button>
            </div>
            <div class="control-group">
                <label>选择数据源</label>
                <select id="segmentSourceSelect" onchange="updateSegmentColumns()">
                    <option value="">请选择文件</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <label>选择列</label>
                <select id="segmentColumnSelect">
                    <option value="">请先选择文件</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <label>数据段名称</label>
                <input type="text" id="segmentName" placeholder="输入数据段名称">
            </div>
            <div class="range-selector" style="margin-top: 10px;">
                <span>起始行:</span>
                <input type="number" id="segmentStartRow" value="0" min="0">
                <span>结束行:</span>
                <input type="number" id="segmentEndRow" value="-1" min="-1">
            </div>
            <button class="btn" style="margin-top: 15px; width: 100%;" onclick="confirmCreateSegment()">确认创建</button>
        </div>
    </div>

    <div class="modal" id="statsModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>📊 区域统计</h3>
                <button class="modal-close" onclick="closeStatsModal()">&times;</button>
            </div>
            <div class="control-group">
                <label>选择数据源</label>
                <select id="statsSourceSelect" onchange="updateStatsColumns()">
                    <option value="">请选择文件或数据段</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <label>选择列（仅文件数据需要）</label>
                <select id="statsColumnSelect">
                    <option value="">请先选择数据源</option>
                </select>
            </div>
            <div class="range-selector" style="margin-top: 10px;">
                <span>起始行:</span>
                <input type="number" id="statsStartRow" value="0" min="0">
                <span>结束行:</span>
                <input type="number" id="statsEndRow" value="-1" min="-1">
            </div>
            <button class="btn" style="margin-top: 15px; width: 100%;" onclick="calculateStats()">计算统计信息</button>
            <div id="statsResults" style="margin-top: 20px; display: none;">
                <div class="stats-info">
                    <h4 style="color: #00d4ff; margin-bottom: 10px;">统计结果</h4>
                    <div id="statsData"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const COLORS = [
            '#00d4ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#9b59b6',
            '#e17055', '#00b894', '#fd79a8', '#a29bfe', '#ffeaa7',
            '#74b9ff', '#ff7675', '#55a3ff', '#fdcb6e', '#e84393'
        ];

        let files = {};
        let segments = [];
        let colorIndex = 0;
        let currentData = [];
        let traceVisibility = {};
        let traceCounter = 0;
        let traceOffsets = {};
        let traceColors = {};
        let plotlyLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(20,20,40,0.5)',
            font: { color: '#e0e0e0' },
            xaxis: {
                title: 'X轴',
                gridcolor: 'rgba(100,100,150,0.3)',
                zerolinecolor: 'rgba(100,100,150,0.5)'
            },
            yaxis: {
                title: 'Y轴',
                gridcolor: 'rgba(100,100,150,0.3)',
                zerolinecolor: 'rgba(100,100,150,0.5)',
                autorange: true
            },
            margin: { l: 60, r: 30, t: 30, b: 60 },
            showlegend: true,
            legend: {
                x: 1,
                y: 1,
                xanchor: 'right',
                bgcolor: 'rgba(40,40,70,0.8)',
                bordercolor: 'rgba(100,100,150,0.5)',
                borderwidth: 1
            },
            hovermode: 'closest'
        };

                reader.readAsText(file);

        function parseCSV(content) {
            const lines = content.split('\n').filter(line => line.trim());
            if (lines.length === 0) return { headers: [], rows: [] };
            
            const parseCSVLine = (line) => {
                const result = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    
                    if (char === '"') {
                        if (inQuotes && line[i + 1] === '"') {
                            current += '"';
                            i++;
                        } else {
                            inQuotes = !inQuotes;
                        }
                    } else if (char === ',' && !inQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                result.push(current.trim());
                return result;
            };
            
            const headers = parseCSVLine(lines[0]);
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((header, index) => {
                    const rawValue = values[index] || '';
                    const val = parseFloat(rawValue);
                    const isFullyNumeric = !isNaN(val) && String(val) === rawValue.trim();
                    row[header] = isFullyNumeric ? val : rawValue;
                });
                data.push(row);
            }
            
            return { headers, rows: data };
        }

        function parseTimestampValue(value, timestampType) {
            let numValue = value;
            if (typeof value === 'string') {
                if (timestampType === 'int64') {
                    numValue = BigInt(value);
                } else {
                    numValue = parseFloat(value);
                }
            }

            if (timestampType === 'int64') {
                return Number(numValue);
            } else if (timestampType === 'uint32') {
                let uint32Value = Number(numValue);
                if (uint32Value < 0) {
                    uint32Value = uint32Value >>> 0;
                }
                return uint32Value;
            } else {
                return Number(numValue);
            }
        }

        function parseTimeStringToTimestamp(timeStr, format) {
            if (!timeStr || typeof timeStr !== 'string') return null;

            timeStr = timeStr.trim();

            const tryParseWithFormat = (str, pattern) => {
                const now = new Date();
                let year = now.getFullYear();
                let month = now.getMonth();
                let day = now.getDate();
                let hours = 0, minutes = 0, seconds = 0, ms = 0;

                if (pattern === 'yyyy/mm/dd_hms_ms' || pattern === 'yyyy/mm/dd_hms') {
                    const dateMatch = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
                    if (dateMatch) {
                        year = parseInt(dateMatch[1]);
                        month = parseInt(dateMatch[2]) - 1;
                        day = parseInt(dateMatch[3]);
                    }
                }

                const timeMatch = str.match(/(\d{1,2}):(\d{1,2}):(\d{1,2})(?:\.(\d+))?/);
                if (timeMatch) {
                    hours = parseInt(timeMatch[1]);
                    minutes = parseInt(timeMatch[2]);
                    seconds = parseInt(timeMatch[3]);
                    if (timeMatch[4]) {
                        ms = parseInt(timeMatch[4].padEnd(3, '0').substring(0, 3));
                    }
                }

                return new Date(year, month, day, hours, minutes, seconds, ms).getTime();
            };

            if (format === 'auto') {
                return tryParseWithFormat(timeStr, 'auto');
            }

            return tryParseWithFormat(timeStr, format);
        }

        function parseTimeValue(value, config) {
            if (value === null || value === undefined || value === '') return null;

            let timestampMs;

            if (config.format === 'timestamp') {
                const rawValue = parseTimestampValue(value, config.timestampType);
                
                if (config.timestampType === 'int64') {
                    timestampMs = rawValue;
                } else {
                    timestampMs = rawValue * 1000;
                }
            } else {
                timestampMs = parseTimeStringToTimestamp(value, config.timeStringFormat);
            }

            if (timestampMs === null || isNaN(timestampMs)) return null;

            const timezoneOffset = (parseInt(config.timezone) - 8) * 60 * 60 * 1000;
            timestampMs -= timezoneOffset;

            return timestampMs;
        }

        function formatDateTime(timestampMs) {
            if (timestampMs === null || isNaN(timestampMs)) return 'N/A';
            
            const date = new Date(timestampMs);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const ms = String(date.getMilliseconds()).padStart(3, '0');
            
            return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}.${ms}`;
        }

        function formatDateTimeShort(timestampMs) {
            if (timestampMs === null || isNaN(timestampMs)) return 'N/A';
            
            const date = new Date(timestampMs);

            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const ms = String(date.getMilliseconds()).padStart(3, '0');
            
            return `${hours}:${minutes}:${seconds}.${ms}`;
        }

                const xOffset = offsetEnabled ? (offsetData.x || 0) : 0;
                const yOffset = offsetEnabled ? (offsetData.y || 0) : 0;
                
                const useTimeColumn = file.timeColumnConfig && 
                                      file.timeColumnConfig.enabled && 
                                      file.timeColumnConfig.column;
                
                let xData, yData;
                
                if (useTimeColumn) {
                    const timeCol = file.timeColumnConfig.column;
                    const timeDataArray = rows.map(row => {
                        return parseTimeValue(row[timeCol], file.timeColumnConfig);
                    });
                    
                    const validIndices = [];
                    timeDataArray.forEach((t, i) => {
                        if (t !== null && !isNaN(t) && isFinite(t)) {
                            validIndices.push(i);
                        }
                    });
                    
                    const isVisible = traceVisibility[traceId] !== false;
                    
                    if (validIndices.length > 0) {
                        xData = validIndices.map(i => timeDataArray[i]);
                        yData = validIndices.map(i => {
                            const val = rows[i][segment.column];
                            return (typeof val === 'number' ? val + yOffset : val);
                        });

                        if (segment.formula) {
                            yData = yData.map(y => {
                                if (typeof y === 'number') {
                                    return evaluateFormula(segment.formula, y);
                                }
                                return y;
                            });
                        }
                        
                        const originalXData = validIndices.map(i => (i + startRow) + xOffset);
                        
                        const hovertemplate = `<b>${segment.name}</b><br>` +
                            `X (行号): %{customdata}<br>` +
                            `Y: %{y}<br>` +
                            `时间: %{text}<extra></extra>`;
                        
                        traces.push({
                            x: xData,
                            y: yData,
                            customdata: originalXData,
                            text: xData.map(t => formatDateTime(t)),
                            mode: displayMode,
                            type: 'scatter',
                            name: segment.name,
                            line: { color: segment.color, width: 2 },
                            marker: { color: segment.color, size: 4 },
                            visible: isVisible,
                            hovertemplate: hovertemplate
                        });
                    } else {
                        const originalXData = rows.map((_, i) => (i + startRow) + xOffset);
                        yData = rows.map(row => {
                            const val = row[segment.column];
                            return (typeof val === 'number' ? val + yOffset : val);
                        });

                        if (segment.formula) {
                            yData = yData.map(y => {
                                if (typeof y === 'number') {
                                    return evaluateFormula(segment.formula, y);
                                }
                                return y;
                            });
                        }
                        
                        xData = originalXData;
                        
                        let hovertemplate;
                        if (timeEnabled) {
                            const timeData = xData.map(x => calculateTime(x, timeOrigin, timeInterval));
                            hovertemplate = `<b>${segment.name}</b><br>` +
                                `X: %{x}<br>` +
                                `Y: %{y}<br>` +
                                `时间: %{text}<extra></extra>`;
                            traces.push({
                                x: xData,
                                y: yData,
                                text: timeData.map(t => formatTime(t)),
                                mode: displayMode,
                                type: 'scatter',
                                name: segment.name,
                                line: { color: segment.color, width: 2 },
                                marker: { color: segment.color, size: 4 },
                                visible: isVisible,
                                hovertemplate: hovertemplate
                            });
                        } else {
                            hovertemplate = `<b>${segment.name}</b><br>` +
                                `X: %{x}<br>` +
                                `Y: %{y}<extra></extra>`;
                            traces.push({
                                x: xData,
                                y: yData,
                                mode: displayMode,
                                type: 'scatter',
                                name: segment.name,
                                line: { color: segment.color, width: 2 },
                                marker: { color: segment.color, size: 4 },
                                visible: isVisible,
                                hovertemplate: hovertemplate
                            });
                        }
                    }
                    
                    const numericYData = yData.filter(y => typeof y === 'number');
                    const segMinY = numericYData.length > 0 ? Math.min(...numericYData) : null;
                    const segMaxY = numericYData.length > 0 ? Math.max(...numericYData) : null;
                    
                    legendItems.push({
                        traceId: traceId,
                        name: segment.name,
                        color: segment.color,
                        visible: isVisible,
                        xOffset: offsetData.x || 0,
                        yOffset: offsetData.y || 0,
                        offsetEnabled: offsetEnabled,
                        minY: segMinY,
                        maxY: segMaxY
                    });
                } else {
                    const originalXData = rows.map((_, i) => (i + startRow) + xOffset);
                    yData = rows.map(row => {
                        const val = row[segment.column];
                        return (typeof val === 'number' ? val + yOffset : val);
                    });

                    if (segment.formula) {
                        yData = yData.map(y => {
                            if (typeof y === 'number') {
                                return evaluateFormula(segment.formula, y);
                            }
                            return y;
                        });
                    }
                    
                    xData = originalXData;
                    const isVisible = traceVisibility[traceId] !== false;

                    let hovertemplate;
                    if (timeEnabled) {
                        const timeData = xData.map(x => calculateTime(x, timeOrigin, timeInterval));
                        hovertemplate = `<b>${segment.name}</b><br>` +
                            `X: %{x}<br>` +
                            `Y: %{y}<br>` +
                            `时间: %{text}<extra></extra>`;
                        traces.push({
                            x: xData,
                            y: yData,
                            text: timeData.map(t => formatTime(t)),
                            mode: displayMode,
                            type: 'scatter',
                            name: segment.name,
                            line: { color: segment.color, width: 2 },
                            marker: { color: segment.color, size: 4 },
                            visible: isVisible,
                            hovertemplate: hovertemplate
                        });
                    } else {
                        hovertemplate = `<b>${segment.name}</b><br>` +
                            `X: %{x}<br>` +
                            `Y: %{y}<extra></extra>`;
                        traces.push({
                            x: xData,
                            y: yData,
                            mode: displayMode,
                            type: 'scatter',
                            name: segment.name,
                            line: { color: segment.color, width: 2 },
                            marker: { color: segment.color, size: 4 },
                            visible: isVisible,
                            hovertemplate: hovertemplate
                        });
                    }
                    
                    const numericYData = yData.filter(y => typeof y === 'number');
                    const segMinY = numericYData.length > 0 ? Math.min(...numericYData) : null;
                    const segMaxY = numericYData.length > 0 ? Math.max(...numericYData) : null;
                    
                    legendItems.push({
                        traceId: traceId,
                        name: segment.name,
                        color: segment.color,
                        visible: isVisible,
                        xOffset: offsetData.x || 0,
                        yOffset: offsetData.y || 0,
                        offsetEnabled: offsetEnabled,
                        minY: segMinY,
                        maxY: segMaxY
                    });
                }
            });

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            traces.forEach(trace => {
                if (trace.x && trace.x.length > 0) {
                    const validX = trace.x.filter(x => x !== null && !isNaN(x) && isFinite(x));
                    if (validX.length > 0) {
                        const xMin = Math.min(...validX);
                        const xMax = Math.max(...validX);
                        if (xMin < minX) minX = xMin;
                        if (xMax > maxX) maxX = xMax;
                    }
                }
                if (trace.y && trace.y.length > 0) {
                    const validY = trace.y.filter(y => typeof y === 'number' && !isNaN(y) && isFinite(y));
                    if (validY.length > 0) {
                        const yMin = Math.min(...validY);
                        const yMax = Math.max(...validY);
                        if (yMin < minY) minY = yMin;
                        if (yMax > maxY) maxY = yMax;
                    }
                }
            });
            
            let layout;
            if (traces.length === 0 || !isFinite(minX) || !isFinite(maxX)) {
                layout = {
                    ...plotlyLayout,
                    xaxis: {
                        ...plotlyLayout.xaxis,
                        title: hasAnyTimeColumn ? '时间' : 'X轴',
                        autorange: true,
                        type: hasAnyTimeColumn ? 'date' : '-'
                    },
                    yaxis: {
                        ...plotlyLayout.yaxis,
                        autorange: true
                    }
                };
            } else {
                const xAxisTitle = hasAnyTimeColumn ? '时间' : 'X轴';
                const yPadding = (maxY - minY) * 0.05 || 1;
                layout = {
                    ...plotlyLayout,
                    xaxis: {
                        ...plotlyLayout.xaxis,
                        title: xAxisTitle,
                        range: [minX, maxX],
                        autorange: false,
                        type: hasAnyTimeColumn ? 'date' : '-'
                    },
                    yaxis: {
                        ...plotlyLayout.yaxis,
                        range: [minY - yPadding, maxY + yPadding],
                        autorange: false
                    }
                };
            }

            Plotly.newPlot('waveformChart', traces, layout, { responsive: true });
            updateLegend(legendItems);
        }

        function evaluateFormula(formula, y) {
            try {
                const safeFormula = formula
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/abs/g, 'Math.abs')
                    .replace(/sqrt/g, 'Math.sqrt')
                    .replace(/log/g, 'Math.log')
                    .replace(/exp/g, 'Math.exp')
                    .replace(/pow/g, 'Math.pow');
                return eval(safeFormula);
            } catch (e) {
                console.error('Formula error:', e);
                return y;
            }
        }

        function updateLegend(legendItems) {
            const container = document.getElementById('legendList');

            if (!legendItems || legendItems.length === 0) {
                container.innerHTML = '<p style="color: #888; font-size: 0.85em;">暂无数据</p>';
                return;
            }

            const escapeHtmlAttr = (str) => String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            container.innerHTML = '';
            
            legendItems.forEach(item => {
                const div = document.createElement('div');
                div.className = 'legend-item';
                
                div.innerHTML = `
                    <input type="checkbox" 
                        class="visibility-toggle" 
                        data-trace-id="${escapeHtmlAttr(item.traceId)}"
                        ${item.visible ? 'checked' : ''}>
                    <div class="legend-color" style="background: ${item.color}; opacity: ${item.visible ? 1 : 0.3}"></div>
                    <div class="legend-info" style="opacity: ${item.visible ? 1 : 0.5}">${item.name}</div>
                    <div class="offset-controls">
                        <label class="offset-enable-label">
                            <input type="checkbox" class="offset-enable-checkbox" data-trace-id="${escapeHtmlAttr(item.traceId)}" ${item.offsetEnabled ? 'checked' : ''}>
                            启用偏移
                        </label>
                        <label>X:</label>
                        <input type="number" class="offset-x-input" data-trace-id="${escapeHtmlAttr(item.traceId)}" value="${item.xOffset}" step="0.1" style="width: 60px">
                        <label>Y:</label>
                        <input type="number" class="offset-y-input" data-trace-id="${escapeHtmlAttr(item.traceId)}" value="${item.yOffset}" step="0.1" style="width: 60px">
                        <button class="btn btn-small reset-offset-btn" data-trace-id="${escapeHtmlAttr(item.traceId)}">重置</button>
                    </div>
                `;
                
                div.querySelector('.visibility-toggle').addEventListener('change', () => toggleTraceVisibility(item.traceId));
                div.querySelector('.offset-enable-checkbox').addEventListener('change', (e) => toggleTraceOffsetEnabled(item.traceId, e.target.checked));
                div.querySelector('.offset-x-input').addEventListener('change', (e) => updateTraceOffset(item.traceId, 'x', e.target.value));
                div.querySelector('.offset-y-input').addEventListener('change', (e) => updateTraceOffset(item.traceId, 'y', e.target.value));
                div.querySelector('.reset-offset-btn').addEventListener('click', () => resetTraceOffset(item.traceId));
                
                container.appendChild(div);
            });
        }
        
        function toggleTraceVisibility(traceId) {
            traceVisibility[traceId] = traceVisibility[traceId] === false ? true : false;
            updateChart();
        }

        function toggleTraceOffsetEnabled(traceId, enabled) {
            if (!traceOffsets[traceId]) {
                traceOffsets[traceId] = { x: 0, y: 0, enabled: false };
            }
            traceOffsets[traceId].enabled = enabled;
            updateChart();
        }

        function updateTraceOffset(traceId, axis, value) {
            if (!traceOffsets[traceId]) {
                traceOffsets[traceId] = { x: 0, y: 0, enabled: false };
            }
            traceOffsets[traceId][axis] = parseFloat(value) || 0;
            updateChart();
        }

        function resetTraceOffset(traceId) {
            traceOffsets[traceId] = { x: 0, y: 0, enabled: false };
            updateChart();
        }

        function updateDisplayMode() {
            updateChart();
        }

        function zoomIn() {
            Plotly.relayout('waveformChart', {
                'xaxis.range': [plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[0] * 0.8 : undefined,
                               plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[1] * 0.8 : undefined]
            });
        }

        function zoomOut() {
            Plotly.relayout('waveformChart', {
                'xaxis.range': [plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[0] * 1.2 : undefined,
                               plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[1] * 1.2 : undefined]
            });
        }

        function resetZoom() {
            updateChart();
        }

        function showFormulaModal() {
            updateFormulaSegmentSelect();
            document.getElementById('formulaModal').classList.add('active');
        }

        function closeFormulaModal() {
            document.getElementById('formulaModal').classList.remove('active');
        }

        function updateFormulaSegmentSelect() {
            const select = document.getElementById('formulaSegmentSelect');
            select.innerHTML = '<option value="">请选择数据段</option>';
            
            segments.forEach((segment, index) => {
                select.innerHTML += `<option value="${index}">${segment.name}</option>`;
            });

            Object.keys(files).forEach(fileName => {
                const file = files[fileName];
                file.selectedColumns.forEach(column => {
                    select.innerHTML += `<option value="file:${fileName}:${column}">${fileName} - ${column}</option>`;
                });
            });
        }

        function applyFormula() {
            const select = document.getElementById('formulaSegmentSelect');
            const formula = document.getElementById('formulaInput').value;
            
            if (!select.value || !formula) {
                alert('请选择数据段并输入公式');
                return;
            }

            if (select.value.startsWith('file:')) {
                const parts = select.value.split(':');
                const fileName = parts[1];
                const column = parts[2];
                
                const segmentName = `${fileName} - ${column} (公式: ${formula})`;
                segments.push({
                    name: segmentName,
                    fileName: fileName,
                    column: column,
                    startRow: files[fileName].startRow,
                    endRow: files[fileName].endRow,
                    formula: formula,
                    color: getNextColor()
                });
            } else {
                const segmentIndex = parseInt(select.value);
                segments[segmentIndex].formula = formula;
                segments[segmentIndex].name += ` (公式: ${formula})`;
            }

            closeFormulaModal();
            updateChart();
        }

        function createSegment() {
            updateSegmentSourceSelect();
            document.getElementById('segmentModal').classList.add('active');
        }

        function closeSegmentModal() {
            document.getElementById('segmentModal').classList.remove('active');
        }

        function updateSegmentSourceSelect() {
            const select = document.getElementById('segmentSourceSelect');
            select.innerHTML = '<option value="">请选择文件</option>';
            
            Object.keys(files).forEach(fileName => {
                select.innerHTML += `<option value="${fileName}">${fileName}</option>`;
            });
        }

        function updateSegmentColumns() {
            const fileName = document.getElementById('segmentSourceSelect').value;
            const columnSelect = document.getElementById('segmentColumnSelect');
            
            if (!fileName || !files[fileName]) {
                columnSelect.innerHTML = '<option value="">请先选择文件</option>';
                return;
            }

            columnSelect.innerHTML = '<option value="">请选择列</option>';
            files[fileName].data.headers.forEach(header => {
                columnSelect.innerHTML += `<option value="${header}">${header}</option>`;
            });

            document.getElementById('segmentStartRow').value = files[fileName].startRow;
            document.getElementById('segmentEndRow').value = files[fileName].endRow;
        }

        function confirmCreateSegment() {
            const fileName = document.getElementById('segmentSourceSelect').value;
            const column = document.getElementById('segmentColumnSelect').value;
            const name = document.getElementById('segmentName').value || `${fileName} - ${column}`;
            const startRow = parseInt(document.getElementById('segmentStartRow').value) || 0;
            const endRow = parseInt(document.getElementById('segmentEndRow').value) || -1;

            if (!fileName || !column) {
                alert('请选择文件和列');
                return;
            }

            segments.push({
                name: name,
                fileName: fileName,
                column: column,
                startRow: startRow,
                endRow: endRow,
                formula: null,
                color: getNextColor()
            });

            closeSegmentModal();
            updateChart();
            updateFormulaSegmentSelect();
            updateStatsSourceSelect();
        }

        function showStatsModal() {
            updateStatsSourceSelect();
            document.getElementById('statsModal').classList.add('active');
        }

        function closeStatsModal() {
            document.getElementById('statsModal').classList.remove('active');
        }

        function updateStatsSourceSelect() {
            const select = document.getElementById('statsSourceSelect');
            select.innerHTML = '<option value="">请选择文件或数据段</option>';
            
            Object.keys(files).forEach(fileName => {
                const file = files[fileName];
                file.selectedColumns.forEach(column => {
                    select.innerHTML += `<option value="file:${fileName}:${column}">文件: ${fileName} - ${column}</option>`;
                });
            });

            segments.forEach((segment, index) => {
                select.innerHTML += `<option value="segment:${index}">数据段: ${segment.name}</option>`;
            });
        }

        function updateStatsColumns() {
            const selectValue = document.getElementById('statsSourceSelect').value;
            const columnSelect = document.getElementById('statsColumnSelect');
            
            if (!selectValue) {
                columnSelect.innerHTML = '<option value="">请先选择数据源</option>';
                return;
            }

            if (selectValue.startsWith('segment:')) {
                columnSelect.innerHTML = '<option value="N/A">数据段无需选择列</option>';
                columnSelect.disabled = true;
            } else if (selectValue.startsWith('file:')) {
                const parts = selectValue.split(':');
                const fileName = parts[1];
                columnSelect.disabled = false;
                columnSelect.innerHTML = '<option value="">请选择列</option>';
                
                if (files[fileName]) {
                    files[fileName].data.headers.forEach(header => {
                        columnSelect.innerHTML += `<option value="${header}">${header}</option>`;
                    });
                    const selectedColumn = parts[2];
                    if (selectedColumn) {
                        columnSelect.value = selectedColumn;
                    }
                }
            }

            const sourceType = selectValue.split(':')[0];
            if (sourceType === 'file') {
                const parts = selectValue.split(':');
                const fileName = parts[1];
                if (files[fileName]) {
                    document.getElementById('statsStartRow').value = files[fileName].startRow;
                    document.getElementById('statsEndRow').value = files[fileName].endRow;
                }
            } else if (sourceType === 'segment') {
                const segmentIndex = parseInt(selectValue.split(':')[1]);
                if (segments[segmentIndex]) {
                    document.getElementById('statsStartRow').value = segments[segmentIndex].startRow;
                    document.getElementById('statsEndRow').value = segments[segmentIndex].endRow;
                }
            }
        }

        function calculateStats() {
            const selectValue = document.getElementById('statsSourceSelect').value;
            const startRow = parseInt(document.getElementById('statsStartRow').value) || 0;
            const endRow = parseInt(document.getElementById('statsEndRow').value) || -1;
            
            if (!selectValue) {
                alert('请选择数据源');
                return;
            }

            let yData = [];
            let xData = [];
            let sourceName = '';

            if (selectValue.startsWith('file:')) {
                const parts = selectValue.split(':');
                const fileName = parts[1];
                const column = document.getElementById('statsColumnSelect').value;
                
                if (!column) {
                    alert('请选择列');
                    return;
                }

                const file = files[fileName];
                if (!file) {
                    alert('文件不存在');
                    return;
                }

                const actualStartRow = Math.max(0, startRow);
                const actualEndRow = endRow === -1 ? file.data.rows.length - 1 : Math.min(endRow, file.data.rows.length - 1);
                const rows = file.data.rows.slice(actualStartRow, actualEndRow + 1);

                yData = rows.map(row => row[column]).filter(val => typeof val === 'number');
                xData = rows.map((row, i) => i + actualStartRow);
                sourceName = `${fileName} - ${column}`;

            } else if (selectValue.startsWith('segment:')) {
                const segmentIndex = parseInt(selectValue.split(':')[1]);
                const segment = segments[segmentIndex];
                
                if (!segment) {
                    alert('数据段不存在');
                    return;
                }

                const file = files[segment.fileName];
                if (!file) {
                    alert('源文件不存在');
                    return;
                }

                const actualStartRow = Math.max(0, startRow);
                const actualEndRow = endRow === -1 ? file.data.rows.length - 1 : Math.min(endRow, file.data.rows.length - 1);
                const rows = file.data.rows.slice(actualStartRow, actualEndRow + 1);

                yData = rows.map(row => row[segment.column]).filter(val => typeof val === 'number');
                xData = rows.map((row, i) => i + actualStartRow);
                sourceName = segment.name;
            }

            if (yData.length === 0) {
                alert('所选区域没有有效数据');
                return;
            }

            const minY = Math.min(...yData);
            const maxY = Math.max(...yData);
            const avgY = yData.reduce((a, b) => a + b, 0) / yData.length;
            const range = maxY - minY;
            const sum = yData.reduce((a, b) => a + b, 0);
            
            const minIndex = yData.indexOf(minY);
            const maxIndex = yData.indexOf(maxY);
            const minX = xData[minIndex];
            const maxX = xData[maxIndex];

            const variance = yData.reduce((acc, val) => acc + Math.pow(val - avgY, 2), 0) / yData.length;
            const stdDev = Math.sqrt(variance);

            const statsHtml = `
                <div class="stats-item">
                    <strong>数据源:</strong> ${sourceName}
                </div>
                <div class="stats-item">
                    <strong>数据范围:</strong> 行 ${startRow} 到 ${endRow === -1 ? '末尾' : endRow}
                </div>
                <div class="stats-item">
                    <strong>数据点数:</strong> ${yData.length}
                </div>
                <div class="stats-item" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(100, 100, 150, 0.3);">
                    <h5 style="color: #ffd93d; margin-bottom: 10px;">最小值信息</h5>
                    <div class="stats-value">最小值: <span style="color: #6bcb77;">${minY.toFixed(4)}</span></div>
                    <div class="stats-location">位置（行号）: <span style="color: #00d4ff;">${minX}</span></div>
                </div>
                <div class="stats-item" style="margin-top: 10px;">
                    <h5 style="color: #ffd93d; margin-bottom: 10px;">最大值信息</h5>
                    <div class="stats-value">最大值: <span style="color: #ff6b6b;">${maxY.toFixed(4)}</span></div>
                    <div class="stats-location">位置（行号）: <span style="color: #00d4ff;">${maxX}</span></div>
                </div>
                <div class="stats-item" style="margin-top: 10px;">
                    <h5 style="color: #ffd93d; margin-bottom: 10px;">其他统计信息</h5>
                    <div class="stats-value">平均值: <span style="color: #a29bfe;">${avgY.toFixed(4)}</span></div>
                    <div class="stats-value">标准差: <span style="color: #a29bfe;">${stdDev.toFixed(4)}</span></div>
                    <div class="stats-value">峰峰值: <span style="color: #a29bfe;">${range.toFixed(4)}</span></div>
                    <div class="stats-value">总和: <span style="color: #a29bfe;">${sum.toFixed(4)}</span></div>
                </div>
            `;

            document.getElementById('statsData').innerHTML = statsHtml;
            document.getElementById('statsResults').style.display = 'block';
        }

        initChart();

        function initChart() {
            Plotly.newPlot('waveformChart', [], plotlyLayout, { responsive: true });
        }
    </script>
</body>
</html>
