<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波形查看工具</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: rgba(30, 30, 50, 0.95);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(100, 100, 150, 0.3);
        }

        .sidebar h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 1.3em;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 1.8em;
        }

        .control-panel {
            background: rgba(40, 40, 70, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .control-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .control-group label {
            font-size: 0.85em;
            color: #aaa;
        }

        .control-group input[type="number"],
        .control-group input[type="text"],
        .control-group select {
            background: rgba(60, 60, 90, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.5);
            color: #fff;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            min-width: 100px;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c5ce7, #5541d7);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .chart-container {
            flex: 1;
            background: rgba(20, 20, 40, 0.8);
            border-radius: 10px;
            padding: 15px;
            min-height: 500px;
        }

        #waveformChart {
            width: 100%;
            height: 100%;
            min-height: 500px;
        }

        .file-section {
            margin-bottom: 20px;
        }

        .file-item {
            background: rgba(50, 50, 80, 0.6);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00d4ff;
        }

        .file-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .file-name {
            font-weight: 600;
            color: #00d4ff;
            font-size: 0.9em;
            word-break: break-all;
        }

        .column-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .column-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(70, 70, 100, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .column-checkbox:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .column-checkbox input {
            accent-color: #00d4ff;
        }

        .range-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .range-selector input {
            width: 80px;
        }

        .segment-item {
            background: rgba(60, 60, 90, 0.5);
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
        }

        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .segment-name {
            color: #ffd93d;
            font-weight: 500;
        }

        .color-indicator {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        .formula-input {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .formula-input input {
            flex: 1;
        }

        .legend-panel {
            background: rgba(40, 40, 70, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }

        .legend-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: rgba(50, 50, 80, 0.5);
            border-radius: 5px;
            margin-bottom: 5px;
            transition: all 0.2s ease;
        }
        
        .legend-item:hover {
            background: rgba(70, 70, 100, 0.6);
        }

        .legend-color {
            width: 30px;
            height: 4px;
            border-radius: 2px;
        }

        .legend-info {
            font-size: 0.85em;
        }

        .offset-controls {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            font-size: 0.8em;
        }

        .offset-controls label {
            color: #aaa;
        }

        .offset-controls input[type="number"] {
            background: rgba(30, 30, 60, 0.8);
            border: 1px solid rgba(100, 100, 150, 0.3);
            color: #e0e0e0;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .slider-container {
            margin-top: 15px;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #aaa;
        }

        .slider-container input[type="range"] {
            width: 100%;
            accent-color: #00d4ff;
        }

        .display-options {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(100, 100, 150, 0.3);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .radio-option input {
            accent-color: #00d4ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(40, 40, 70, 0.95);
            border-radius: 15px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #00d4ff;
        }

        .modal-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5em;
            cursor: pointer;
        }

        .modal-close:hover {
            color: #fff;
        }

        .formula-help {
            background: rgba(60, 60, 90, 0.5);
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            font-size: 0.85em;
        }

        .formula-help h4 {
            color: #ffd93d;
            margin-bottom: 8px;
        }

        .formula-help code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state p {
            margin-top: 10px;
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
        }

        .data-info {
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        .segments-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .visibility-toggle {
            accent-color: #00d4ff;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                max-height: 40vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>📁 数据管理</h2>
            
            <div class="file-section">
                <div class="file-input-wrapper">
                    <button class="btn">📂 导入CSV文件</button>
                    <input type="file" id="fileInput" accept=".csv" multiple>
                </div>
            </div>

            <div id="filesList"></div>

            <div class="display-options">
                <h3 style="color: #00d4ff; margin-bottom: 10px; font-size: 1em;">📊 显示选项</h3>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="lines" checked onchange="updateDisplayMode()">
                        <span>折线图</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="markers" onchange="updateDisplayMode()">
                        <span>散点图</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="displayMode" value="lines+markers" onchange="updateDisplayMode()">
                        <span>混合</span>
                    </label>
                </div>
            </div>

            <div class="legend-panel">
                <h3 style="color: #00d4ff; margin-bottom: 10px; font-size: 1em;">📋 图例</h3>
                <div id="legendList">
                    <p style="color: #888; font-size: 0.85em;">暂无数据</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>🌊 波形查看工具</h1>
                <div class="zoom-controls">
                    <button class="btn btn-small" onclick="zoomIn()">🔍+ 放大</button>
                    <button class="btn btn-small" onclick="zoomOut()">🔍- 缩小</button>
                    <button class="btn btn-small" onclick="resetZoom()">↺ 重置</button>
                </div>
            </div>

            <div class="control-panel">
                <div class="control-row">
                    <div class="control-group">
                        <label>X轴偏移 (Offset)</label>
                        <input type="number" id="xOffset" value="0" step="0.1" onchange="applyOffsets()">
                    </div>
                    <div class="control-group">
                        <label>Y轴偏移 (Offset)</label>
                        <input type="number" id="yOffset" value="0" step="0.1" onchange="applyOffsets()">
                    </div>
                    <div class="control-group">
                        <label>X轴缩放</label>
                        <input type="number" id="xScale" value="1" step="0.1" min="0.1" onchange="applyOffsets()">
                    </div>
                    <div class="control-group">
                        <label>Y轴缩放</label>
                        <input type="number" id="yScale" value="1" step="0.1" min="0.1" onchange="applyOffsets()">
                    </div>
                    <button class="btn btn-secondary" onclick="showFormulaModal()">📐 公式运算</button>
                    <button class="btn btn-secondary" onclick="createSegment()">📌 创建数据段</button>
                </div>
                
                <div class="slider-container">
                    <label>波形位置滑动</label>
                    <input type="range" id="positionSlider" min="0" max="100" value="0" oninput="slideWaveform(this.value)">
                </div>
            </div>

            <div class="chart-container">
                <div id="waveformChart"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="formulaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📐 公式运算</h3>
                <button class="modal-close" onclick="closeFormulaModal()">&times;</button>
            </div>
            <div class="control-group">
                <label>选择数据段</label>
                <select id="formulaSegmentSelect">
                    <option value="">请选择数据段</option>
                </select>
            </div>
            <div class="formula-input">
                <input type="text" id="formulaInput" placeholder="输入公式，如: y*2+1">
                <button class="btn" onclick="applyFormula()">应用</button>
            </div>
            <div class="formula-help">
                <h4>公式说明</h4>
                <p>使用 <code>y</code> 代表原始数据值，支持以下运算：</p>
                <p>• 基本运算: <code>+ - * /</code></p>
                <p>• 数学函数: <code>sin(y), cos(y), abs(y), sqrt(y), log(y), exp(y)</code></p>
                <p>• 示例: <code>y*2</code>, <code>y+10</code>, <code>sin(y)</code></p>
            </div>
        </div>
    </div>

    <div class="modal" id="segmentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📌 创建数据段</h3>
                <button class="modal-close" onclick="closeSegmentModal()">&times;</button>
            </div>
            <div class="control-group">
                <label>选择数据源</label>
                <select id="segmentSourceSelect" onchange="updateSegmentColumns()">
                    <option value="">请选择文件</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <label>选择列</label>
                <select id="segmentColumnSelect">
                    <option value="">请先选择文件</option>
                </select>
            </div>
            <div class="control-group" style="margin-top: 10px;">
                <label>数据段名称</label>
                <input type="text" id="segmentName" placeholder="输入数据段名称">
            </div>
            <div class="range-selector" style="margin-top: 10px;">
                <span>起始行:</span>
                <input type="number" id="segmentStartRow" value="0" min="0">
                <span>结束行:</span>
                <input type="number" id="segmentEndRow" value="-1" min="-1">
            </div>
            <button class="btn" style="margin-top: 15px; width: 100%;" onclick="confirmCreateSegment()">确认创建</button>
        </div>
    </div>

    <script>
        const COLORS = [
            '#00d4ff', '#ff6b6b', '#ffd93d', '#6bcb77', '#9b59b6',
            '#e17055', '#00b894', '#fd79a8', '#a29bfe', '#ffeaa7',
            '#74b9ff', '#ff7675', '#55a3ff', '#fdcb6e', '#e84393'
        ];

        let files = {};
        let segments = [];
        let colorIndex = 0;
        let currentData = [];
        let traceVisibility = {};
        let traceCounter = 0;
        let viewOffset = 0;
        let viewWindow = 50;
        let traceOffsets = {};
        let traceColors = {};
        let plotlyLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(20,20,40,0.5)',
            font: { color: '#e0e0e0' },
            xaxis: {
                title: 'X轴',
                gridcolor: 'rgba(100,100,150,0.3)',
                zerolinecolor: 'rgba(100,100,150,0.5)'
            },
            yaxis: {
                title: 'Y轴',
                gridcolor: 'rgba(100,100,150,0.3)',
                zerolinecolor: 'rgba(100,100,150,0.5)',
                autorange: true
            },
            margin: { l: 60, r: 30, t: 30, b: 60 },
            showlegend: true,
            legend: {
                x: 1,
                y: 1,
                xanchor: 'right',
                bgcolor: 'rgba(40,40,70,0.8)',
                bordercolor: 'rgba(100,100,150,0.5)',
                borderwidth: 1
            },
            hovermode: 'closest'
        };

        function getNextColor() {
            const color = COLORS[colorIndex % COLORS.length];
            colorIndex++;
            return color;
        }

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const fileList = event.target.files;
            for (let file of fileList) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const content = e.target.result;
                    const parsed = parseCSV(content);
                    files[file.name] = {
                        data: parsed,
                        selectedColumns: [],
                        startRow: 0,
                        endRow: parsed.length - 1
                    };
                    renderFilesList();
                    updateChart();
                };
                reader.readAsText(file);
            }
        }

        function parseCSV(content) {
            const lines = content.split('\n').filter(line => line.trim());
            if (lines.length === 0) return [];
            
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim().replace(/"/g, ''));
                const row = {};
                headers.forEach((header, index) => {
                    const val = parseFloat(values[index]);
                    row[header] = isNaN(val) ? values[index] : val;
                });
                data.push(row);
            }
            
            return { headers, rows: data };
        }

        function renderFilesList() {
            const container = document.getElementById('filesList');
            container.innerHTML = '';
            
            Object.keys(files).forEach((fileName, fileIndex) => {
                const file = files[fileName];
                const div = document.createElement('div');
                div.className = 'file-item';
                
                const columnsHtml = file.data.headers.map(header => `
                    <label class="column-checkbox">
                        <input type="checkbox" 
                            ${file.selectedColumns.includes(header) ? 'checked' : ''}
                            onchange="toggleColumn('${fileName}', '${header}')">
                        ${header}
                    </label>
                `).join('');
                
                div.innerHTML = `
                    <div class="file-item-header">
                        <span class="file-name">📄 ${fileName}</span>
                        <button class="btn btn-danger btn-small" onclick="removeFile('${fileName}')">删除</button>
                    </div>
                    <div class="column-selector">${columnsHtml}</div>
                    <div class="range-selector">
                        <span>起始行:</span>
                        <input type="number" value="${file.startRow}" min="0" 
                            onchange="updateRange('${fileName}', 'start', this.value)">
                        <span>结束行:</span>
                        <input type="number" value="${file.endRow}" min="-1"
                            onchange="updateRange('${fileName}', 'end', this.value)">
                    </div>
                    <div class="data-info">共 ${file.data.rows.length} 行数据</div>
                `;
                
                container.appendChild(div);
            });

            updateSegmentSourceSelect();
        }

        function toggleColumn(fileName, column) {
            const file = files[fileName];
            const index = file.selectedColumns.indexOf(column);
            
            if (index > -1) {
                file.selectedColumns.splice(index, 1);
            } else {
                file.selectedColumns.push(column);
            }
            
            updateChart();
        }

        function updateRange(fileName, type, value) {
            const file = files[fileName];
            if (type === 'start') {
                file.startRow = parseInt(value) || 0;
            } else {
                file.endRow = parseInt(value);
            }
            updateChart();
        }

        function removeFile(fileName) {
            delete files[fileName];
            segments = segments.filter(s => s.fileName !== fileName);
            renderFilesList();
            updateChart();
            updateLegend();
        }

        function updateChart() {
            const traces = [];
            const displayMode = document.querySelector('input[name="displayMode"]:checked').value;
            const xScale = parseFloat(document.getElementById('xScale').value) || 1;
            const yScale = parseFloat(document.getElementById('yScale').value) || 1;
            
            const legendItems = [];

            Object.keys(files).forEach((fileName, fileIndex) => {
                const file = files[fileName];
                const startRow = Math.max(0, file.startRow);
                const endRow = file.endRow === -1 ? file.data.rows.length - 1 : Math.min(file.endRow, file.data.rows.length - 1);
                const rows = file.data.rows.slice(startRow, endRow + 1);

                file.selectedColumns.forEach((column, colIndex) => {
                    const traceId = `file_${fileName}_${column}`;
                    
                    if (!traceOffsets[traceId]) {
                        traceOffsets[traceId] = { x: 0, y: 0 };
                    }
                    
                    if (!traceColors[traceId]) {
                        traceColors[traceId] = getNextColor();
                    }
                    
                    const color = traceColors[traceId];
                    
                    const xOffset = traceOffsets[traceId].x || 0;
                    const yOffset = traceOffsets[traceId].y || 0;
                    
                    const xData = rows.map((_, i) => (i + startRow) * xScale + xOffset);
                    const yData = rows.map(row => {
                        const val = row[column];
                        return (typeof val === 'number' ? val * yScale + yOffset : val);
                    });
                    
                    const isVisible = traceVisibility[traceId] !== false;

                    traces.push({
                        x: xData,
                        y: yData,
                        mode: displayMode,
                        type: 'scatter',
                        name: `${fileName} - ${column}`,
                        line: { color: color, width: 2 },
                        marker: { color: color, size: 4 },
                        visible: isVisible
                    });
                    
                    legendItems.push({
                        traceId: traceId,
                        name: `${fileName} - ${column}`,
                        color: color,
                        visible: isVisible,
                        xOffset: xOffset,
                        yOffset: yOffset
                    });
                });
            });

            segments.forEach(segment => {
                const file = files[segment.fileName];
                if (!file) return;

                const startRow = Math.max(0, segment.startRow);
                const endRow = segment.endRow === -1 ? file.data.rows.length - 1 : Math.min(segment.endRow, file.data.rows.length - 1);
                const rows = file.data.rows.slice(startRow, endRow + 1);

                const traceId = `segment_${segment.name}_${segment.fileName}_${segment.column}`;
                
                if (!traceOffsets[traceId]) {
                    traceOffsets[traceId] = { x: 0, y: 0 };
                }
                
                const xOffset = traceOffsets[traceId].x || 0;
                const yOffset = traceOffsets[traceId].y || 0;
                
                const xData = rows.map((_, i) => (i + startRow) * xScale + xOffset);
                let yData = rows.map(row => {
                    const val = row[segment.column];
                    return (typeof val === 'number' ? val * yScale + yOffset : val);
                });

                if (segment.formula) {
                    yData = yData.map(y => {
                        if (typeof y === 'number') {
                            return evaluateFormula(segment.formula, y);
                        }
                        return y;
                    });
                }
                
                const isVisible = traceVisibility[traceId] !== false;

                traces.push({
                    x: xData,
                    y: yData,
                    mode: displayMode,
                    type: 'scatter',
                    name: segment.name,
                    line: { color: segment.color, width: 2 },
                    marker: { color: segment.color, size: 4 },
                    visible: isVisible
                });
                
                legendItems.push({
                    traceId: traceId,
                    name: segment.name,
                    color: segment.color,
                    visible: isVisible,
                    xOffset: xOffset,
                    yOffset: yOffset
                });
            });

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            traces.forEach(trace => {
                if (trace.x && trace.x.length > 0) {
                    const xMin = Math.min(...trace.x);
                    const xMax = Math.max(...trace.x);
                    if (xMin < minX) minX = xMin;
                    if (xMax > maxX) maxX = xMax;
                }
                if (trace.y && trace.y.length > 0 && typeof trace.y[0] === 'number') {
                    const yMin = Math.min(...trace.y);
                    const yMax = Math.max(...trace.y);
                    if (yMin < minY) minY = yMin;
                    if (yMax > maxY) maxY = yMax;
                }
            });
            
            const xOffset = parseFloat(document.getElementById('xOffset').value) || 0;
            const yOffset = parseFloat(document.getElementById('yOffset').value) || 0;
            
            let layout;
            if (traces.length === 0) {
                layout = plotlyLayout;
            } else {
                const xRange = [viewOffset + xOffset, Math.max(viewOffset + viewWindow, maxX) + xOffset];
                const yRange = [minY + yOffset, maxY + yOffset];
                layout = {
                    ...plotlyLayout,
                    xaxis: {
                        ...plotlyLayout.xaxis,
                        range: xRange,
                        autorange: false
                    },
                    yaxis: {
                        ...plotlyLayout.yaxis,
                        range: yRange,
                        autorange: false
                    }
                };
            }

            Plotly.newPlot('waveformChart', traces, layout, { responsive: true });
            updateLegend(legendItems);
        }

        function evaluateFormula(formula, y) {
            try {
                const safeFormula = formula
                    .replace(/sin/g, 'Math.sin')
                    .replace(/cos/g, 'Math.cos')
                    .replace(/abs/g, 'Math.abs')
                    .replace(/sqrt/g, 'Math.sqrt')
                    .replace(/log/g, 'Math.log')
                    .replace(/exp/g, 'Math.exp')
                    .replace(/pow/g, 'Math.pow');
                return eval(safeFormula);
            } catch (e) {
                console.error('Formula error:', e);
                return y;
            }
        }

        function updateLegend(legendItems) {
            const container = document.getElementById('legendList');

            if (!legendItems || legendItems.length === 0) {
                container.innerHTML = '<p style="color: #888; font-size: 0.85em;">暂无数据</p>';
                return;
            }

            container.innerHTML = legendItems.map(item => `
                <div class="legend-item">
                    <input type="checkbox" 
                        class="visibility-toggle" 
                        data-trace-id="${item.traceId}"
                        ${item.visible ? 'checked' : ''}
                        onchange="toggleTraceVisibility('${item.traceId}')">
                    <div class="legend-color" style="background: ${item.color}; opacity: ${item.visible ? 1 : 0.3}"></div>
                    <div class="legend-info" style="opacity: ${item.visible ? 1 : 0.5}">${item.name}</div>
                    <div class="offset-controls">
                        <label>X:</label>
                        <input type="number" value="${item.xOffset}" step="0.1" style="width: 60px" onchange="updateTraceOffset('${item.traceId}', 'x', this.value)">
                        <label>Y:</label>
                        <input type="number" value="${item.yOffset}" step="0.1" style="width: 60px" onchange="updateTraceOffset('${item.traceId}', 'y', this.value)">
                        <button class="btn btn-small" onclick="resetTraceOffset('${item.traceId}')">重置</button>
                    </div>
                </div>
            `).join('');
        }
        
        function toggleTraceVisibility(traceId) {
            traceVisibility[traceId] = traceVisibility[traceId] === false ? true : false;
            updateChart();
        }

        function updateTraceOffset(traceId, axis, value) {
            if (!traceOffsets[traceId]) {
                traceOffsets[traceId] = { x: 0, y: 0 };
            }
            traceOffsets[traceId][axis] = parseFloat(value) || 0;
            updateChart();
        }

        function resetTraceOffset(traceId) {
            traceOffsets[traceId] = { x: 0, y: 0 };
            updateChart();
        }

        function updateDisplayMode() {
            updateChart();
        }

        function applyOffsets() {
            updateChart();
        }

        function zoomIn() {
            Plotly.relayout('waveformChart', {
                'xaxis.range': [plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[0] * 0.8 : undefined,
                               plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[1] * 0.8 : undefined]
            });
        }

        function zoomOut() {
            Plotly.relayout('waveformChart', {
                'xaxis.range': [plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[0] * 1.2 : undefined,
                               plotlyLayout.xaxis.range ? plotlyLayout.xaxis.range[1] * 1.2 : undefined]
            });
        }

        function resetZoom() {
            document.getElementById('xOffset').value = 0;
            document.getElementById('yOffset').value = 0;
            document.getElementById('xScale').value = 1;
            document.getElementById('yScale').value = 1;
            document.getElementById('positionSlider').value = 0;
            viewOffset = 0;
            viewWindow = 50;
            updateChart();
        }

        function slideWaveform(value) {
            let maxX = 0;
            Object.keys(files).forEach(fileName => {
                const file = files[fileName];
                if (file.data.rows.length > maxX) {
                    maxX = file.data.rows.length;
                }
            });
            
            viewOffset = parseFloat(value) / 100 * Math.max(0, maxX - viewWindow);
            updateChart();
        }

        function showFormulaModal() {
            updateFormulaSegmentSelect();
            document.getElementById('formulaModal').classList.add('active');
        }

        function closeFormulaModal() {
            document.getElementById('formulaModal').classList.remove('active');
        }

        function updateFormulaSegmentSelect() {
            const select = document.getElementById('formulaSegmentSelect');
            select.innerHTML = '<option value="">请选择数据段</option>';
            
            segments.forEach((segment, index) => {
                select.innerHTML += `<option value="${index}">${segment.name}</option>`;
            });

            Object.keys(files).forEach(fileName => {
                const file = files[fileName];
                file.selectedColumns.forEach(column => {
                    select.innerHTML += `<option value="file:${fileName}:${column}">${fileName} - ${column}</option>`;
                });
            });
        }

        function applyFormula() {
            const select = document.getElementById('formulaSegmentSelect');
            const formula = document.getElementById('formulaInput').value;
            
            if (!select.value || !formula) {
                alert('请选择数据段并输入公式');
                return;
            }

            if (select.value.startsWith('file:')) {
                const parts = select.value.split(':');
                const fileName = parts[1];
                const column = parts[2];
                
                const segmentName = `${fileName} - ${column} (公式: ${formula})`;
                segments.push({
                    name: segmentName,
                    fileName: fileName,
                    column: column,
                    startRow: files[fileName].startRow,
                    endRow: files[fileName].endRow,
                    formula: formula,
                    color: getNextColor()
                });
            } else {
                const segmentIndex = parseInt(select.value);
                segments[segmentIndex].formula = formula;
                segments[segmentIndex].name += ` (公式: ${formula})`;
            }

            closeFormulaModal();
            updateChart();
        }

        function createSegment() {
            updateSegmentSourceSelect();
            document.getElementById('segmentModal').classList.add('active');
        }

        function closeSegmentModal() {
            document.getElementById('segmentModal').classList.remove('active');
        }

        function updateSegmentSourceSelect() {
            const select = document.getElementById('segmentSourceSelect');
            select.innerHTML = '<option value="">请选择文件</option>';
            
            Object.keys(files).forEach(fileName => {
                select.innerHTML += `<option value="${fileName}">${fileName}</option>`;
            });
        }

        function updateSegmentColumns() {
            const fileName = document.getElementById('segmentSourceSelect').value;
            const columnSelect = document.getElementById('segmentColumnSelect');
            
            if (!fileName || !files[fileName]) {
                columnSelect.innerHTML = '<option value="">请先选择文件</option>';
                return;
            }

            columnSelect.innerHTML = '<option value="">请选择列</option>';
            files[fileName].data.headers.forEach(header => {
                columnSelect.innerHTML += `<option value="${header}">${header}</option>`;
            });

            document.getElementById('segmentStartRow').value = files[fileName].startRow;
            document.getElementById('segmentEndRow').value = files[fileName].endRow;
        }

        function confirmCreateSegment() {
            const fileName = document.getElementById('segmentSourceSelect').value;
            const column = document.getElementById('segmentColumnSelect').value;
            const name = document.getElementById('segmentName').value || `${fileName} - ${column}`;
            const startRow = parseInt(document.getElementById('segmentStartRow').value) || 0;
            const endRow = parseInt(document.getElementById('segmentEndRow').value) || -1;

            if (!fileName || !column) {
                alert('请选择文件和列');
                return;
            }

            segments.push({
                name: name,
                fileName: fileName,
                column: column,
                startRow: startRow,
                endRow: endRow,
                formula: null,
                color: getNextColor()
            });

            closeSegmentModal();
            updateChart();
            updateFormulaSegmentSelect();
        }

        initChart();

        function initChart() {
            Plotly.newPlot('waveformChart', [], plotlyLayout, { responsive: true });
        }
    </script>
</body>
</html>
